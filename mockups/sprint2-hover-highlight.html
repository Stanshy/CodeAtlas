<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAtlas — Hover Highlight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0f0f1a 0%, #0a0a0f 60%, #070710 100%);
    }
    #canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    #canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(7,7,16,0.6) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* ── SVG edges ── */
    #edges-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Nodes layer ── */
    #nodes {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    /* ── Node base ── */
    .node {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 150ms ease-out,
                  box-shadow 150ms ease-out,
                  border-color 150ms ease-out,
                  background 150ms ease-out,
                  opacity 200ms ease-out;
      user-select: none;
    }

    .node-file {
      min-width: 140px;
      max-width: 220px;
      height: 48px;
      border-radius: 8px;
      border: 1.5px solid #00d4ff;
      background: rgba(0,212,255,0.07);
      box-shadow: 0 0 8px rgba(0,212,255,0.25), 0 0 16px rgba(0,212,255,0.10);
    }

    .node-dir {
      min-width: 160px;
      max-width: 280px;
      height: 56px;
      border-radius: 10px;
      border: 1.5px solid #8855ff;
      background: rgba(136,85,255,0.08);
      box-shadow: 0 0 8px rgba(189,0,255,0.25), 0 0 16px rgba(189,0,255,0.10);
      flex-direction: column;
      align-items: flex-start;
      padding: 0;
      overflow: hidden;
    }

    .node-dir-accent {
      width: 100%;
      height: 3px;
      background: #bd00ff;
      flex-shrink: 0;
    }
    .node-dir-body {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      width: 100%;
      flex: 1;
    }

    .node-icon { flex-shrink: 0; width: 14px; height: 14px; }
    .node-icon-file { color: #00d4ff; }
    .node-icon-dir  { color: #bd00ff; }

    .node-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: #e8eaf6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-sublabel {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: #9e9ec8;
    }
    .node-label-stack {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(26,26,46,0.90);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px;
      backdrop-filter: blur(8px);
    }
    .toolbar-title { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 700; color: #e8eaf6; padding: 0 10px 0 6px; }
    .toolbar-title span { color: #00d4ff; }
    .toolbar-divider { width: 1px; height: 24px; background: rgba(255,255,255,0.10); margin: 0 4px; }
    .toolbar-btn {
      width: 32px; height: 32px; border: none; background: transparent;
      border-radius: 6px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; color: #9e9ec8; font-size: 16px; font-weight: 600;
      transition: background 100ms, color 100ms;
    }
    .toolbar-btn:hover { background: rgba(255,255,255,0.06); color: #e8eaf6; }

    /* ── Hint label ── */
    #hint {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 30;
      background: rgba(26,26,46,0.90);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 14px;
      backdrop-filter: blur(8px);
      font-size: 12px;
      color: #9e9ec8;
    }
    #hint strong { color: #00d4ff; }

    /* ══════════════════════════════════════════
       HOVER HIGHLIGHT SYSTEM
       Uses the "graph has-hover" class approach:
       when any node is hovered, all non-related
       nodes and edges fade out.
    ══════════════════════════════════════════ */

    /* When a node group is hovered, canvas gets class "hovering" */
    /* Non-highlighted nodes fade */
    #nodes.hovering .node:not(.highlight) {
      opacity: 0.35;
    }
    #nodes.hovering .node.highlight.node-file {
      border-color: #00ffff;
      border-width: 2px;
      background: rgba(0,212,255,0.12);
      box-shadow: 0 0 12px rgba(0,212,255,0.50), 0 0 24px rgba(0,212,255,0.25), 0 0 40px rgba(0,212,255,0.10);
      transform: scale(1.04);
      z-index: 20;
      opacity: 1;
    }
    #nodes.hovering .node.highlight.node-dir {
      border-color: #bd00ff;
      border-width: 2px;
      background: rgba(189,0,255,0.13);
      box-shadow: 0 0 12px rgba(189,0,255,0.50), 0 0 24px rgba(189,0,255,0.25), 0 0 40px rgba(189,0,255,0.10);
      transform: scale(1.02);
      z-index: 20;
      opacity: 1;
    }
    /* The primary hovered node gets intense glow */
    #nodes.hovering .node.hovered.node-file {
      box-shadow: 0 0 16px rgba(0,255,255,0.70), 0 0 32px rgba(0,212,255,0.40), 0 0 60px rgba(0,212,255,0.20);
      transform: scale(1.07);
    }
    #nodes.hovering .node.hovered.node-dir {
      box-shadow: 0 0 16px rgba(255,0,255,0.70), 0 0 32px rgba(189,0,255,0.40), 0 0 60px rgba(189,0,255,0.20);
      transform: scale(1.04);
    }

    /* SVG edge highlight classes (toggled via JS) */
    .edge-line {
      transition: stroke 100ms ease-out, stroke-width 100ms ease-out, opacity 200ms ease-out, filter 100ms ease-out;
    }
    .edge-line.faded {
      opacity: 0.12 !important;
    }
    .edge-line.highlighted {
      stroke: #00ff88 !important;
      stroke-width: 2.5 !important;
      opacity: 1 !important;
      filter: drop-shadow(0 0 6px rgba(0,255,136,0.80));
    }

    /* Minimap */
    #minimap {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 160px;
      height: 120px;
      background: rgba(10,10,15,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      z-index: 30;
      overflow: hidden;
    }
    #minimap-svg { width: 100%; height: 100%; }
    #minimap-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 9px;
      font-weight: 500;
      color: #5c5c88;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>

</div>

<script>
  // ── Edge definitions ──
  const EDGES = [
    { id:'e1', from:'n-index', to:'n-core' },
    { id:'e2', from:'n-core', to:'n-cli' },
    { id:'e3', from:'n-core', to:'n-web' },
    { id:'e4', from:'n-shared', to:'n-core' },
    { id:'e5', from:'n-core', to:'n-graph-builder' },
    { id:'e6', from:'n-graph-builder', to:'n-scanner' },
    { id:'e7', from:'n-scanner', to:'n-parser' },
    { id:'e8', from:'n-cli', to:'n-server' },
    { id:'e9', from:'n-cli', to:'n-main' },
    { id:'e10', from:'n-main', to:'n-server' },
    { id:'e11', from:'n-web', to:'n-app' },
    { id:'e12', from:'n-types', to:'n-core' },
    { id:'e13', from:'n-types', to:'n-shared' },
    { id:'e14', from:'n-utils', to:'n-shared' },
    { id:'e15', from:'n-utils', to:'n-scanner' },
    { id:'e16', from:'n-parser', to:'n-types' },
    { id:'e17', from:'n-graph-builder', to:'n-types' },
  ];

  const svg = document.getElementById('edges-svg');
  const nodesLayer = document.getElementById('nodes');
  const canvas = document.getElementById('canvas');

  // Build adjacency
  const adj = {};
  EDGES.forEach(e => {
    if(!adj[e.from]) adj[e.from] = new Set();
    if(!adj[e.to])   adj[e.to]   = new Set();
    adj[e.from].add(e.to);
    adj[e.to].add(e.from);
  });

  function nc(id) {
    const el = document.getElementById(id);
    const r = el.getBoundingClientRect();
    const cr = canvas.getBoundingClientRect();
    return { x: r.left - cr.left + r.width/2, y: r.top - cr.top + r.height/2 };
  }

  function bezier(x1,y1,x2,y2) {
    const dx = x2-x1;
    return `M${x1},${y1} C${x1+dx*0.5},${y1} ${x1+dx*0.5},${y2} ${x2},${y2}`;
  }

  const pathMap = {};

  function init() {
    EDGES.forEach(e => {
      const p = nc(e.from), q = nc(e.to);
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', bezier(p.x,p.y,q.x,q.y));
      path.setAttribute('stroke','#00cc66');
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('opacity','0.7');
      path.setAttribute('fill','none');
      path.setAttribute('marker-end','url(#arrow-normal)');
      path.setAttribute('id', e.id);
      path.classList.add('edge-line');
      svg.appendChild(path);
      pathMap[e.id] = { el: path, from: e.from, to: e.to };
    });

    // Hover logic
    document.querySelectorAll('.node').forEach(node => {
      const id = node.id;

      node.addEventListener('mouseenter', () => {
        const neighbors = new Set(adj[id] || []);
        neighbors.add(id);
        nodesLayer.classList.add('hovering');

        // Mark nodes
        document.querySelectorAll('.node').forEach(n => {
          n.classList.remove('highlight','hovered');
          if(neighbors.has(n.id)) {
            n.classList.add('highlight');
            if(n.id === id) n.classList.add('hovered');
          }
        });

        // Mark edges
        Object.values(pathMap).forEach(({el, from, to}) => {
          el.classList.remove('highlighted','faded');
          if((from === id || to === id) || (neighbors.has(from) && neighbors.has(to))) {
            el.classList.add('highlighted');
          } else {
            el.classList.add('faded');
          }
        });
      });

      node.addEventListener('mouseleave', () => {
        nodesLayer.classList.remove('hovering');
        document.querySelectorAll('.node').forEach(n => n.classList.remove('highlight','hovered'));
        Object.values(pathMap).forEach(({el}) => el.classList.remove('highlighted','faded'));
      });
    });
  }

  window.addEventListener('load', init);
</script>
</body>
</html>
