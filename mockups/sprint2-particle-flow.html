<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAtlas — Particle Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Canvas ── */
    #canvas {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0f0f1a 0%, #0a0a0f 60%, #070710 100%);
    }
    #canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }
    #canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(7,7,16,0.6) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* ── SVG layer ── */
    #graph-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* ── Nodes layer ── */
    #nodes {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    /* ── Base node styles ── */
    .node {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 150ms ease-out, box-shadow 150ms ease-out,
                  border-color 150ms ease-out, background 150ms ease-out;
      user-select: none;
    }

    .node-file {
      min-width: 140px;
      height: 48px;
      border-radius: 8px;
      border: 1.5px solid #00d4ff;
      background: rgba(0,212,255,0.07);
      box-shadow: 0 0 8px rgba(0,212,255,0.25), 0 0 16px rgba(0,212,255,0.10);
    }
    .node-file:hover {
      border-color: #00ffff;
      border-width: 2px;
      background: rgba(0,212,255,0.12);
      box-shadow: 0 0 12px rgba(0,212,255,0.50), 0 0 24px rgba(0,212,255,0.25), 0 0 40px rgba(0,212,255,0.10);
      transform: scale(1.04);
      z-index: 20;
    }

    .node-dir {
      min-width: 160px;
      height: 56px;
      border-radius: 10px;
      border: 1.5px solid #8855ff;
      background: rgba(136,85,255,0.08);
      box-shadow: 0 0 8px rgba(189,0,255,0.25), 0 0 16px rgba(189,0,255,0.10);
      flex-direction: column;
      align-items: flex-start;
      padding: 0;
      overflow: hidden;
    }
    .node-dir:hover {
      border-color: #bd00ff;
      border-width: 2px;
      background: rgba(189,0,255,0.13);
      box-shadow: 0 0 12px rgba(189,0,255,0.50), 0 0 24px rgba(189,0,255,0.25), 0 0 40px rgba(189,0,255,0.10);
      transform: scale(1.02);
      z-index: 20;
    }

    .node-dir-accent { width:100%; height:3px; background:#bd00ff; }
    .node-dir-body   { display:flex; align-items:center; gap:8px; padding:9px 14px; width:100%; flex:1; }

    .node-icon       { flex-shrink:0; width:14px; height:14px; }
    .node-icon-file  { color:#00d4ff; }
    .node-icon-dir   { color:#bd00ff; }

    .node-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: #e8eaf6;
      white-space: nowrap;
    }
    .node-sublabel {
      font-size: 10px;
      color: #9e9ec8;
    }
    .node-label-stack { display:flex; flex-direction:column; gap:2px; overflow:hidden; }

    /* ══════════════════════════════════════════════
       PARTICLE FLOW KEYFRAMES
       Uses CSS offset-path (motion path) to flow
       particles along SVG bezier curves.
    ══════════════════════════════════════════════ */

    @keyframes particle-flow {
      0%   { offset-distance: 0%;   opacity: 0; }
      8%   { opacity: 0.85; }
      85%  { opacity: 0.85; }
      95%  { opacity: 0.3; }
      100% { offset-distance: 100%; opacity: 0; }
    }

    /* Particle trail glow  */
    @keyframes particle-trail {
      0%   { offset-distance: 0%;   opacity: 0; transform: scale(1); }
      8%   { opacity: 0.40; }
      85%  { opacity: 0.15; }
      100% { offset-distance: 100%; opacity: 0; transform: scale(0.5); }
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #00ff88;
      animation: particle-flow 2s linear infinite;
      box-shadow: 0 0 4px rgba(0,255,136,0.80), 0 0 8px rgba(0,255,136,0.40);
      z-index: 5;
      pointer-events: none;
    }

    /* Trail particle (slightly larger, lower opacity) */
    .particle-trail {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(0,255,136,0.25);
      animation: particle-trail 2s linear infinite;
      z-index: 4;
      pointer-events: none;
    }

    /* reduced-motion: replace animation with static dots */
    @media (prefers-reduced-motion: reduce) {
      .particle {
        animation: none;
        offset-distance: 50%;
        opacity: 0.4;
      }
      .particle-trail { display: none; }
    }

    /* ── Toolbar ── */
    #toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(26,26,46,0.90);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px;
      backdrop-filter: blur(8px);
    }
    .toolbar-title { font-size:24px; font-weight:700; color:#e8eaf6; padding:0 10px 0 6px; }
    .toolbar-title span { color:#00d4ff; }
    .toolbar-divider { width:1px; height:24px; background:rgba(255,255,255,0.10); margin:0 4px; }
    .toolbar-btn {
      width:32px; height:32px; border:none; background:transparent;
      border-radius:6px; cursor:pointer; display:flex; align-items:center;
      justify-content:center; color:#9e9ec8; font-size:16px; font-weight:600;
      transition:background 100ms,color 100ms;
    }
    .toolbar-btn:hover { background:rgba(255,255,255,0.06); color:#e8eaf6; }

    /* ── Legend ── */
    #legend {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 30;
      background: rgba(26,26,46,0.90);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px 16px;
      backdrop-filter: blur(8px);
    }
    .legend-title {
      font-size: 10px;
      font-weight: 600;
      color: #5c5c88;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      color: #9e9ec8;
      margin-bottom: 5px;
    }
    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .legend-line {
      width: 20px;
      height: 2px;
      border-radius: 1px;
    }

    /* ── Minimap ── */
    #minimap {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 160px;
      height: 120px;
      background: rgba(10,10,15,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      z-index: 30;
      overflow: hidden;
    }
    #minimap-svg { width:100%; height:100%; }
    #minimap-label {
      position: absolute;
      top: 6px; left: 8px;
      font-size: 9px; font-weight: 500;
      color: #5c5c88;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
  </style>
</head>

</div>

<script>
  const svg     = document.getElementById('graph-svg');
  const canvas  = document.getElementById('canvas');
  const body    = document.body;

  /* ── Particle count per edge ── */
  const PARTICLES_PER_EDGE = 3;
  const DURATION_MS = 2000;

  /* ── Edge definitions ── */
  const EDGES = [
    { id:'e1',  from:'n-index',         to:'n-core'          },
    { id:'e2',  from:'n-core',          to:'n-cli'           },
    { id:'e3',  from:'n-core',          to:'n-web'           },
    { id:'e4',  from:'n-shared',        to:'n-core'          },
    { id:'e5',  from:'n-core',          to:'n-graph-builder' },
    { id:'e6',  from:'n-graph-builder', to:'n-scanner'       },
    { id:'e7',  from:'n-scanner',       to:'n-parser'        },
    { id:'e8',  from:'n-cli',           to:'n-server'        },
    { id:'e9',  from:'n-cli',           to:'n-main'          },
    { id:'e10', from:'n-main',          to:'n-server'        },
    { id:'e11', from:'n-web',           to:'n-app'           },
    { id:'e12', from:'n-types',         to:'n-core'          },
    { id:'e13', from:'n-types',         to:'n-shared'        },
    { id:'e14', from:'n-utils',         to:'n-shared'        },
    { id:'e15', from:'n-utils',         to:'n-scanner'       },
    { id:'e16', from:'n-parser',        to:'n-types'         },
    { id:'e17', from:'n-graph-builder', to:'n-types'         },
  ];

  /* ── Get node center ── */
  function nc(id) {
    const el = document.getElementById(id);
    const r  = el.getBoundingClientRect();
    const cr = canvas.getBoundingClientRect();
    return { x: r.left - cr.left + r.width/2, y: r.top - cr.top + r.height/2 };
  }

  /* ── Build bezier path string ── */
  function buildBezier(x1,y1,x2,y2) {
    const dx = x2-x1;
    const cx1 = x1 + dx*0.50, cy1 = y1;
    const cx2 = x1 + dx*0.50, cy2 = y2;
    return `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`;
  }

  /* ── Draw edges and spawn particles ── */
  function init() {
    EDGES.forEach((e, idx) => {
      const p  = nc(e.from);
      const q  = nc(e.to);
      const d  = buildBezier(p.x,p.y,q.x,q.y);

      /* ── SVG path (visual edge line) ── */
      const pathEl = document.createElementNS('http://www.w3.org/2000/svg','path');
      pathEl.setAttribute('d', d);
      pathEl.setAttribute('stroke','#00cc66');
      pathEl.setAttribute('stroke-width','1.5');
      pathEl.setAttribute('opacity','0.70');
      pathEl.setAttribute('fill','none');
      pathEl.setAttribute('marker-end','url(#arrow)');
      pathEl.setAttribute('id', e.id);
      svg.appendChild(pathEl);

      /* ── Invisible path for CSS offset-path ── */
      const motionPath = document.createElementNS('http://www.w3.org/2000/svg','path');
      motionPath.setAttribute('d', d);
      motionPath.setAttribute('id', `mp-${e.id}`);
      motionPath.setAttribute('fill','none');
      motionPath.setAttribute('stroke','none');
      svg.appendChild(motionPath);

      /* ── Spawn particles ── */
      for(let i=0; i < PARTICLES_PER_EDGE; i++) {
        const delay = -(DURATION_MS / PARTICLES_PER_EDGE) * i;
        spawnParticle(e.id, delay);
        spawnTrail(e.id, delay);
      }
    });
  }

  function spawnParticle(edgeId, delayMs) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = `
      offset-path: url(#mp-${edgeId});
      offset-rotate: 0deg;
      animation-delay: ${delayMs}ms;
      animation-duration: ${DURATION_MS}ms;
    `;
    body.appendChild(el);
  }

  function spawnTrail(edgeId, delayMs) {
    const el = document.createElement('div');
    el.className = 'particle-trail';
    el.style.cssText = `
      offset-path: url(#mp-${edgeId});
      offset-rotate: 0deg;
      animation-delay: ${delayMs - 80}ms;
      animation-duration: ${DURATION_MS}ms;
    `;
    body.appendChild(el);
  }

  window.addEventListener('load', init);
</script>
</body>
