<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAtlas — Main View</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Canvas ── */
    #canvas {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 50% 50%, #0f0f1a 0%, #0a0a0f 60%, #070710 100%);
    }

    /* Dot grid */
    #canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
    }

    /* Vignette */
    #canvas::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(7,7,16,0.6) 100%);
      pointer-events: none;
      z-index: 10;
    }

    /* ── SVG edges layer ── */
    #edges-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Nodes layer ── */
    #nodes {
      position: absolute;
      inset: 0;
      z-index: 2;
    }

    /* ── Base node ── */
    .node {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 150ms ease-out, box-shadow 150ms ease-out, border-color 150ms ease-out, background 150ms ease-out;
      user-select: none;
    }

    /* ── File node ── */
    .node-file {
      min-width: 140px;
      max-width: 220px;
      height: 48px;
      border-radius: 8px;
      border: 1.5px solid #00d4ff;
      background: rgba(0,212,255,0.07);
      box-shadow: 0 0 8px rgba(0,212,255,0.25), 0 0 16px rgba(0,212,255,0.10);
    }
    .node-file:hover {
      border-color: #00ffff;
      border-width: 2px;
      background: rgba(0,212,255,0.12);
      box-shadow: 0 0 12px rgba(0,212,255,0.50), 0 0 24px rgba(0,212,255,0.25), 0 0 40px rgba(0,212,255,0.10);
      transform: scale(1.04);
      z-index: 20;
    }

    /* ── Directory node ── */
    .node-dir {
      min-width: 160px;
      max-width: 280px;
      height: 56px;
      border-radius: 10px;
      border: 1.5px solid #8855ff;
      background: rgba(136,85,255,0.08);
      box-shadow: 0 0 8px rgba(189,0,255,0.25), 0 0 16px rgba(189,0,255,0.10);
      flex-direction: column;
      align-items: flex-start;
      padding: 0;
      overflow: hidden;
    }
    .node-dir:hover {
      border-color: #bd00ff;
      border-width: 2px;
      background: rgba(189,0,255,0.13);
      box-shadow: 0 0 12px rgba(189,0,255,0.50), 0 0 24px rgba(189,0,255,0.25), 0 0 40px rgba(189,0,255,0.10);
      transform: scale(1.02);
      z-index: 20;
    }

    .node-dir-accent {
      width: 100%;
      height: 3px;
      background: #bd00ff;
      flex-shrink: 0;
    }

    .node-dir-body {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      width: 100%;
      flex: 1;
    }

    /* ── Node icon ── */
    .node-icon {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
    }
    .node-icon-file { color: #00d4ff; }
    .node-icon-dir  { color: #bd00ff; }

    /* ── Labels ── */
    .node-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: #e8eaf6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .node-sublabel {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: #9e9ec8;
      white-space: nowrap;
    }
    .node-label-stack {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    #toolbar {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(26,26,46,0.90);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 6px;
      backdrop-filter: blur(8px);
    }

    .toolbar-title {
      font-family: 'Inter', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #e8eaf6;
      padding: 0 10px 0 6px;
      letter-spacing: -0.3px;
    }
    .toolbar-title span {
      color: #00d4ff;
    }

    .toolbar-divider {
      width: 1px;
      height: 24px;
      background: rgba(255,255,255,0.10);
      margin: 0 4px;
    }

    .toolbar-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #9e9ec8;
      font-size: 16px;
      font-weight: 600;
      transition: background 100ms, color 100ms;
    }
    .toolbar-btn:hover {
      background: rgba(255,255,255,0.06);
      color: #e8eaf6;
    }
    .toolbar-btn:active {
      background: rgba(0,212,255,0.10);
      color: #00d4ff;
    }

    /* ── Minimap ── */
    #minimap {
      position: absolute;
      bottom: 16px;
      right: 16px;
      width: 160px;
      height: 120px;
      background: rgba(10,10,15,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      backdrop-filter: blur(4px);
      z-index: 30;
      overflow: hidden;
    }
    #minimap-svg {
      width: 100%;
      height: 100%;
    }
    #minimap-label {
      position: absolute;
      top: 6px;
      left: 8px;
      font-size: 9px;
      font-weight: 500;
      color: #5c5c88;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Node count badge ── */
    .node-count-badge {
      position: absolute;
      top: 4px;
      right: 4px;
      font-size: 9px;
      color: #5c5c88;
    }

  </style>
</head>

<script>
  // Draw edges on SVG
  const svg = document.getElementById('edges-svg');
  const W = svg.clientWidth || window.innerWidth;
  const H = svg.clientHeight || window.innerHeight;

  // Node center helpers (based on CSS positions)
  function nc(el) {
    const r = el.getBoundingClientRect();
    const cr = document.getElementById('canvas').getBoundingClientRect();
    return { x: r.left - cr.left + r.width/2, y: r.top - cr.top + r.height/2 };
  }

  function drawEdge(x1, y1, x2, y2, opacity=0.7, width=1.5) {
    const dx = x2 - x1, dy = y2 - y1;
    const cx1 = x1 + dx * 0.5;
    const cy1 = y1;
    const cx2 = x1 + dx * 0.5;
    const cy2 = y2;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d', `M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}`);
    path.setAttribute('stroke','#00cc66');
    path.setAttribute('stroke-width', width);
    path.setAttribute('opacity', opacity);
    path.setAttribute('fill','none');
    path.setAttribute('marker-end','url(#arrow)');
    svg.appendChild(path);
  }

  function init() {
    const ids = ['n-index','n-core','n-cli','n-web','n-shared',
                 'n-graph-builder','n-scanner','n-parser','n-server',
                 'n-main','n-app','n-types','n-utils'];
    const pos = {};
    ids.forEach(id => { pos[id] = nc(document.getElementById(id)); });

    const edges = [
      ['n-index','n-core'],
      ['n-core','n-cli'],
      ['n-core','n-web'],
      ['n-shared','n-core'],
      ['n-core','n-graph-builder'],
      ['n-graph-builder','n-scanner'],
      ['n-scanner','n-parser'],
      ['n-cli','n-server'],
      ['n-cli','n-main'],
      ['n-main','n-server'],
      ['n-web','n-app'],
      ['n-types','n-core'],
      ['n-types','n-shared'],
      ['n-utils','n-shared'],
      ['n-utils','n-scanner'],
      ['n-parser','n-types'],
    ];

    edges.forEach(([a,b]) => {
      const p = pos[a], q = pos[b];
      if(p && q) drawEdge(p.x, p.y, q.x, q.y);
    });
  }

  window.addEventListener('load', init);
</script>
</body>
</html>
