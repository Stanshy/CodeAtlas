<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CodeAtlas — Method Level Mockup (Sprint 13)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS (Sprint 12 exact copy)
   ============================================================ */
:root {
  --bg-paper:        #fafafa;
  --bg-grid:         #f0f0f0;
  --grid-line:       #d8d8d8;
  --grid-line-major: #c8c8c8;
  --ink-primary:     #1a1a2e;
  --ink-secondary:   #4a4a6a;
  --ink-muted:       #8888aa;
  --ink-faint:       #bbbbcc;
  --border-default:  #d0d0d8;
  --shadow-card:     0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-hover:    0 4px 16px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.06);
  --sf-border:       #1565c0;
  --sf-bg:           #e3f2fd;
  --sf-accent:       #1976d2;
  --sf-line:         #1e88e5;
  --lo-routes:       #1565c0;
  --lo-services:     #7b1fa2;
  --lo-controllers:  #e65100;
  --lo-models:       #4e342e;
  --lo-utils:        #546e7a;
  --lo-middleware:   #00838f;
  --dj-border:       #2e7d32;
  --dj-bg:           #e8f5e9;
  --dj-accent:       #388e3c;
  --dj-line:         #43a047;
  --dj-glow:         rgba(46, 125, 50, 0.2);
  --font-ui: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-ui);
  background: var(--bg-paper);
  color: var(--ink-primary);
  font-size: 14px;
  line-height: 1.5;
}

/* ============================================================
   GRID BACKGROUND
   ============================================================ */
.grid-bg {
  background-color: var(--bg-paper);
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
    linear-gradient(var(--grid-line-major) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line-major) 1px, transparent 1px);
  background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
}

/* ============================================================
   LAYOUT
   ============================================================ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  min-width: 1200px;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  height: 48px;
  background: white;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
  z-index: 10;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 15px;
  color: var(--ink-primary);
}
.header-logo svg { width: 20px; height: 20px; }
.header-sep { color: var(--ink-faint); font-size: 12px; }
.header-path {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink-secondary);
  background: #f4f4f8;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border-default);
}
.header-badge {
  margin-left: auto;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* Tab Bar */
#tabbar {
  display: flex;
  align-items: stretch;
  height: 44px;
  background: white;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
  padding: 0 8px;
  gap: 2px;
}
.tab-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 18px;
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  color: var(--ink-muted);
  transition: color 0.15s, border-color 0.15s;
  white-space: nowrap;
}
.tab-btn:hover { color: var(--ink-secondary); }
.tab-btn.active { color: var(--ink-primary); }
.tab-btn.active.sf-tab { border-bottom-color: var(--sf-border); }
.tab-btn.active.lo-tab { border-bottom-color: var(--lo-services); }
.tab-btn.active.dj-tab { border-bottom-color: var(--dj-border); }
.tab-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.sf-dot { background: var(--sf-border); }
.lo-dot { background: conic-gradient(var(--lo-routes) 0deg 90deg, var(--lo-services) 90deg 180deg, var(--lo-models) 180deg 270deg, var(--lo-middleware) 270deg 360deg); }
.dj-dot { background: var(--dj-border); }

/* Main area */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Canvas */
.canvas-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.canvas-area.scrollable {
  overflow-y: auto;
}
.canvas-area svg {
  width: 100%;
  height: 100%;
  display: block;
}
.canvas-area.scrollable svg {
  height: auto;
  min-height: 100%;
}

/* Tab panels visibility */
.tab-panel { display: none; width: 100%; height: 100%; }
.tab-panel.active { display: flex; }

/* Right Panel */
.right-panel {
  width: 300px;
  flex-shrink: 0;
  background: white;
  border-left: 1px solid var(--border-default);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.panel-placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 8px;
  color: var(--ink-faint);
  font-size: 13px;
  text-align: center;
  padding: 24px;
}
.panel-placeholder svg { opacity: 0.3; }
.panel-content { display: none; flex-direction: column; height: 100%; }
.panel-content.visible { display: flex; }

/* Panel sections */
.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
}
.panel-header-title {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-primary);
  word-break: break-all;
}
.panel-header-sub {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 2px;
}
.panel-section {
  padding: 10px 16px;
  border-bottom: 1px solid #f0f0f4;
  flex-shrink: 0;
}
.panel-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.panel-stat-row {
  display: flex;
  gap: 16px;
  margin-bottom: 4px;
}
.panel-stat {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.panel-stat-val {
  font-size: 18px;
  font-weight: 700;
  color: var(--ink-primary);
}
.panel-stat-label {
  font-size: 10px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.panel-file-list { display: flex; flex-direction: column; gap: 2px; }
.panel-file-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border-radius: 4px;
  cursor: pointer;
  transition: background 0.1s;
}
.panel-file-row:hover { background: #f4f4f8; }
.panel-file-toggle {
  width: 14px; height: 14px;
  color: var(--ink-muted);
  flex-shrink: 0;
  font-size: 10px;
  transition: transform 0.15s;
}
.panel-file-toggle.open { transform: rotate(90deg); }
.panel-file-name {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-secondary);
  flex: 1;
}
.panel-file-badge {
  font-size: 10px;
  color: var(--ink-muted);
  background: #f0f0f4;
  padding: 1px 5px;
  border-radius: 3px;
}
.panel-fn-list {
  display: none;
  flex-direction: column;
  gap: 1px;
  padding: 4px 0 4px 20px;
  border-top: 1px solid #f4f4f8;
}
.panel-fn-list.open { display: flex; }
.panel-fn-item {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-muted);
  padding: 2px 4px;
}
.panel-dep-list { display: flex; flex-direction: column; gap: 4px; }
.panel-dep-item {
  font-size: 12px;
  color: var(--ink-secondary);
  padding: 3px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-dep-item::before {
  content: '•';
  color: var(--ink-faint);
}
.panel-dep-item.api-dep::before { content: '→'; color: var(--sf-accent); }

/* Bottom Legend */
#legend {
  height: 36px;
  background: white;
  border-top: 1px solid var(--border-default);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  overflow: hidden;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--ink-secondary);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.legend-line {
  width: 20px; height: 2px;
  flex-shrink: 0;
}

/* ============================================================
   TAB 1: SYSTEM FRAMEWORK
   ============================================================ */
.sf-node-foreign { overflow: visible; }
.sf-card {
  width: 150px;
  height: 80px;
  background: white;
  border: 1.5px solid var(--sf-border);
  border-radius: 8px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  cursor: pointer;
  transition: box-shadow 0.15s, transform 0.15s;
  display: flex;
  flex-direction: column;
  user-select: none;
}
.sf-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-1px); }
.sf-card.selected { box-shadow: 0 0 0 3px rgba(21,101,192,0.4), var(--shadow-hover); }
.sf-card.dimmed { opacity: 0.3; }
.sf-card.highlighted { box-shadow: 0 0 0 2px rgba(21,101,192,0.6), var(--shadow-hover); }
.sf-card-accent {
  height: 5px;
  background: var(--sf-line);
  flex-shrink: 0;
}
.sf-card-accent.backend { background: #1565c0; }
.sf-card-accent.frontend { background: #7b1fa2; }
.sf-card-accent.infra { background: #546e7a; }
.sf-card-body {
  flex: 1;
  padding: 6px 8px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.sf-card-name {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-primary);
  line-height: 1.3;
  word-break: break-all;
}
.sf-card-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sf-card-badge {
  font-size: 9px;
  color: var(--sf-accent);
  background: var(--sf-bg);
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 500;
}
.sf-card-badge.auto-expanded {
  background: #fce4ec;
  color: #c62828;
}
.sf-card-icon { font-size: 14px; line-height: 1; }

/* ============================================================
   TAB 2: LOGIC OPERATION
   ============================================================ */
.lo-hint {
  position: absolute;
  top: 14px; left: 0; right: 0;
  text-align: center;
  pointer-events: none;
  z-index: 5;
  transition: opacity 0.3s;
}
.lo-hint-text {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 400;
}
.lo-hint-sub {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 2px;
}

/* Category group cards */
.lo-group-card {
  background: white;
  border: 1.5px solid var(--border-default);
  border-radius: 10px;
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: box-shadow 0.2s;
}
.lo-group-card:hover { box-shadow: var(--shadow-hover); }
.lo-group-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 700;
  color: white;
  border-bottom: 1px solid rgba(0,0,0,0.1);
}
.lo-group-header .lo-group-count {
  margin-left: auto;
  font-size: 10px;
  font-weight: 500;
  opacity: 0.8;
}
.lo-group-methods {
  padding: 6px 8px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.lo-method-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 6px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-secondary);
  transition: background 0.1s, color 0.1s;
}
.lo-method-row:hover {
  background: #f0f0f8;
  color: var(--ink-primary);
}
.lo-method-row .lo-method-star {
  color: #f59e0b;
  font-size: 10px;
  flex-shrink: 0;
}
.lo-method-row .lo-method-cls {
  font-family: var(--font-ui);
  font-size: 9px;
  color: var(--ink-faint);
  margin-left: auto;
  white-space: nowrap;
}
.lo-toggle-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 4px 6px;
  margin-top: 2px;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-faint);
  background: #f5f5fa;
  border: 1px dashed var(--border-default);
  transition: background 0.15s, color 0.15s;
  user-select: none;
}
.lo-toggle-btn:hover {
  background: #eeeef6;
  color: var(--ink-secondary);
}

/* Group dependency edges */
.lo-group-edge {
  fill: none;
  stroke: #bbb;
  stroke-width: 1.5;
  stroke-dasharray: 6 3;
  opacity: 0.6;
}

/* Zoom controls (shared by all tabs) */
.zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 20;
}
.zoom-btn {
  width: 32px;
  height: 32px;
  border: 1px solid var(--border-default);
  border-radius: 6px;
  background: white;
  color: var(--ink-secondary);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--shadow-card);
  transition: background 0.1s, box-shadow 0.1s;
  font-family: var(--font-mono);
  line-height: 1;
}
.zoom-btn:hover { background: var(--bg-grid); box-shadow: var(--shadow-hover); }
.zoom-label {
  text-align: center;
  font-size: 10px;
  font-weight: 600;
  color: var(--ink-muted);
  padding: 2px 0;
  font-family: var(--font-mono);
}

.lo-chain-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  background: #fff8e1;
  color: #e65100;
  border: 1px solid #ffcc02;
  border-radius: 3px;
  padding: 1px 5px;
  font-weight: 600;
}
.lo-bottom-bar {
  height: 44px;
  background: white;
  border-top: 1px solid var(--border-default);
  display: none;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
}
.lo-bottom-bar.visible { display: flex; }
.lo-chain-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-primary);
}
.lo-chain-count {
  font-size: 12px;
  color: var(--ink-muted);
}
.lo-clear-btn {
  margin-left: auto;
  padding: 6px 14px;
  background: white;
  border: 1px solid var(--border-default);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-secondary);
  transition: background 0.1s, border-color 0.1s;
}
.lo-clear-btn:hover { background: #f4f4f8; border-color: var(--ink-muted); }

/* Method node via foreignObject */
.lo-method-node {
  cursor: pointer;
  overflow: visible;
}
.lo-node-card {
  width: 100px;
  height: 28px;
  background: white;
  border-radius: 4px;
  border-left: 3px solid var(--lo-routes);
  box-shadow: var(--shadow-card);
  display: flex;
  align-items: center;
  padding: 0 6px;
  gap: 4px;
  transition: all 0.2s;
  overflow: hidden;
  user-select: none;
}
.lo-node-card:hover { box-shadow: var(--shadow-hover); }
.lo-node-card.active-node {
  width: 160px;
  height: 44px;
  border-width: 2px;
  box-shadow: var(--shadow-hover);
  align-items: flex-start;
  padding: 6px 8px;
  flex-direction: column;
  gap: 2px;
}
.lo-node-card.selected-node {
  box-shadow: 0 0 0 3px rgba(0,0,0,0.2), var(--shadow-hover);
}
.lo-node-method {
  font-family: var(--font-mono);
  font-size: 9px;
  font-weight: 600;
  color: var(--ink-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}
.lo-node-class {
  font-size: 8px;
  color: var(--ink-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: none;
}
.lo-node-card.active-node .lo-node-method { font-size: 11px; flex: 0 0 auto; }
.lo-node-card.active-node .lo-node-class { display: block; }

/* Lo right panel */
.lo-panel-sig {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-secondary);
  background: #f8f8fc;
  padding: 8px 10px;
  border-radius: 4px;
  border: 1px solid var(--border-default);
  white-space: pre-wrap;
  word-break: break-all;
}
.lo-metric-row {
  display: flex;
  gap: 12px;
  margin-top: 6px;
}
.lo-metric {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.lo-metric-val {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink-primary);
}
.lo-metric-label {
  font-size: 10px;
  color: var(--ink-muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

/* ============================================================
   TAB 3: DATA JOURNEY
   ============================================================ */
.dj-entry-card {
  width: 100%;
  height: 100%;
  background: white;
  border: 1.5px dashed var(--dj-border);
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-card);
  user-select: none;
  box-sizing: border-box;
}
.dj-entry-card:hover {
  border-style: solid;
  border-color: var(--dj-accent);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.dj-entry-card.selected {
  border-style: solid;
  border-color: var(--dj-accent);
  box-shadow: 0 0 0 3px var(--dj-glow), var(--shadow-hover);
}
.dj-pulse-ring {
  fill: none;
  stroke: var(--dj-line);
  stroke-width: 2;
  opacity: 0;
  animation: dj-pulse 2s ease-out infinite;
  pointer-events: none;
}
@keyframes dj-pulse {
  0% { opacity: 0.5; }
  100% { opacity: 0; }
}
.dj-entry-method {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-primary);
  margin-bottom: 3px;
}
.dj-entry-desc {
  font-size: 11px;
  color: var(--ink-muted);
}
.dj-entry-badge {
  display: inline-block;
  font-size: 9px;
  background: var(--dj-bg);
  color: var(--dj-accent);
  border: 1px solid var(--dj-border);
  border-radius: 3px;
  padding: 1px 5px;
  margin-top: 4px;
  font-weight: 600;
}

/* Journey step node */
.dj-step-node {
  background: white;
  border: 1.5px solid var(--dj-border);
  border-radius: 8px;
  padding: 8px 12px;
  min-width: 260px;
  max-width: 340px;
  box-shadow: var(--shadow-card);
  transition: all 0.3s;
  opacity: 0;
  transform: translateY(10px);
}
.dj-step-node.appeared {
  opacity: 1;
  transform: translateY(0);
}
.dj-step-node.active-step {
  border-color: var(--dj-accent);
  box-shadow: 0 0 0 3px var(--dj-glow), var(--shadow-hover);
}
.dj-step-num {
  font-size: 10px;
  font-weight: 700;
  color: var(--dj-accent);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 2px;
}
.dj-step-name {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-primary);
}
.dj-step-desc {
  font-size: 11px;
  color: var(--ink-muted);
  margin-top: 2px;
}

/* DJ hint overlay */
.dj-hint {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);

function initSF() {
  const wrap = document.getElementById('sf-canvas-wrap');
  const svg = document.getElementById('sf-svg');
  const W = wrap.clientWidth || 1200;
  const H = wrap.clientHeight || 600;
  svg.setAttribute('viewBox', `0 0 ${Math.max(W, 1350)} ${Math.max(H, 580)}`);
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');

  // Define arrow marker
  const defs = createSVGEl('defs');
  defs.innerHTML = `
    <marker id="sf-arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e88e5" opacity="0.7"/>
    </marker>
  `;
  svg.appendChild(defs);

  // Draw edges first (behind nodes)
  const edgeGroup = createSVGEl('g', { id: 'sf-edges' });
  SF_EDGES.forEach((e, i) => {
    const from = SF_POSITIONS[e.from];
    const to = SF_POSITIONS[e.to];
    if (!from || !to) return;
    const path = createSVGEl('path', {
      id: `sf-edge-${i}`,
      class: 'sf-edge',
      'data-from': e.from,
      'data-to': e.to,
      'marker-end': 'url(#sf-arrow)',
      'd': calcEdgePath(from, to, 150, 80)
    });
    edgeGroup.appendChild(path);
  });
  svg.appendChild(edgeGroup);

  // Draw nodes via foreignObject
  const nodeGroup = createSVGEl('g', { id: 'sf-nodes' });
  SF_NODES.forEach(node => {
    const pos = SF_POSITIONS[node.id];
    if (!pos) return;
    const fo = createSVGEl('foreignObject', {
      x: pos.x, y: pos.y,
      width: 150, height: 80,
      id: `sf-fo-${node.id}`
    });
    fo.setAttribute('overflow', 'visible');
    const div = document.createElement('div');
    div.className = 'sf-card';
    div.setAttribute('data-id', node.id);
    div.innerHTML = `
      <div class="sf-card-accent ${node.category}"></div>
      <div class="sf-card-body">
        <div class="sf-card-name">${node.label}</div>
        <div class="sf-card-bottom">
          <span class="sf-card-badge ${node.autoExpand ? 'auto-expanded' : ''}">${node.autoExpand ? 'auto-expanded ↓' : node.files + ' files'}</span>
          <span class="sf-card-icon">${node.autoExpand ? '🔄' : '📁'}</span>
        </div>
        ${!node.autoExpand ? `<div style="font-size:9px;color:var(--ink-muted);margin-top:1px;">${node.files} files</div>` : ''}
      </div>
    `;
    div.addEventListener('click', () => sfSelectNode(node.id, div));
    fo.appendChild(div);
    nodeGroup.appendChild(fo);
  });
  svg.appendChild(nodeGroup);
}

function calcEdgePath(from, to, W, H) {
  const fx = from.x + W / 2;
  const fy = from.y + H / 2;
  const tx = to.x + W / 2;
  const ty = to.y + H / 2;
  // Source: bottom of from, target: top of to (if below) or side
  const dy = ty - fy;
  const dx = tx - fx;
  if (Math.abs(dy) > Math.abs(dx)) {
    // vertical
    const sy = from.y + H;
    const ey = to.y;
    const mx = (fx + tx) / 2;
    return `M ${fx} ${sy} C ${fx} ${sy + 30}, ${tx} ${ey - 30}, ${tx} ${ey}`;
  } else {
    // horizontal
    const sx = dx > 0 ? from.x + W : from.x;
    const ex = dx > 0 ? to.x : to.x + W;
    const my = (fy + ty) / 2;
    return `M ${sx} ${fy} C ${sx + dx * 0.4} ${fy}, ${ex - dx * 0.4} ${ty}, ${ex} ${ty}`;
  }
}

function sfSelectNode(id, el) {
  // Reset previous
  document.querySelectorAll('.sf-card').forEach(c => {
    c.classList.remove('selected', 'dimmed', 'highlighted');
  });
  document.querySelectorAll('.sf-edge').forEach(e => {
    e.classList.remove('highlighted', 'dimmed');
  });

  sfSelectedNode = id;
  el.classList.add('selected');

  // Find connected edges and nodes
  const connectedNodes = new Set([id]);
  SF_EDGES.forEach((e, i) => {
    const edgeEl = document.getElementById(`sf-edge-${i}`);
    if (!edgeEl) return;
    if (e.from === id || e.to === id) {
      edgeEl.classList.add('highlighted');
      connectedNodes.add(e.from);
      connectedNodes.add(e.to);
    } else {
      edgeEl.classList.add('dimmed');
    }
  });

  // Dim unconnected nodes
  document.querySelectorAll('.sf-card').forEach(c => {
    const cid = c.getAttribute('data-id');
    if (!connectedNodes.has(cid)) {
      c.classList.add('dimmed');
    } else if (cid !== id) {
      c.classList.add('highlighted');
    }
  });

  // Show detail panel
  sfShowDetail(id);
}

function sfShowDetail(id) {
  const d = SF_NODE_DETAILS[id];
  if (!d) return;
  document.getElementById('sf-placeholder').style.display = 'none';
  const detailEl = document.getElementById('sf-detail');
  detailEl.classList.add('visible');

  const fnListsHtml = d.files.map((f, fi) => `
    <div class="panel-file-row" onclick="sfToggleFile(${fi}, '${id}')">
      <span class="panel-file-toggle" id="sf-toggle-${id}-${fi}">▶</span>
      <span class="panel-file-name">${f.name}</span>
      ${f.fns > 0 ? `<span class="panel-file-badge">${f.fns} fn</span>` : ''}
    </div>
    <div class="panel-fn-list" id="sf-fnlist-${id}-${fi}">
      ${f.fns > 0 ? Array.from({length: Math.min(f.fns, 5)}, (_, i) => `<span class="panel-fn-item">fn_${i+1}()</span>`).join('') : ''}
    </div>
  `).join('');

  detailEl.innerHTML = `
    <div class="panel-header">
      <div class="panel-header-title">📁 ${d.title}</div>
      <div class="panel-header-sub">${d.path}</div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">📊 Statistics</div>
      <div class="panel-stat-row">
        <div class="panel-stat"><div class="panel-stat-val">${d.stats.files}</div><div class="panel-stat-label">Files</div></div>
        <div class="panel-stat"><div class="panel-stat-val">${d.stats.functions}</div><div class="panel-stat-label">Functions</div></div>
        <div class="panel-stat"><div class="panel-stat-val">${d.stats.lines}</div><div class="panel-stat-label">Lines</div></div>
      </div>
    </div>
    ${d.files.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">📄 Files</div>
      <div class="panel-file-list">${fnListsHtml}</div>
    </div>` : ''}
    ${d.upstream.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">⬆ Upstream (imported by)</div>
      <div class="panel-dep-list">${d.upstream.map(u => `<div class="panel-dep-item">${u}</div>`).join('')}</div>
    </div>` : ''}
    ${d.downstream.length > 0 ? `
    <div class="panel-section">
      <div class="panel-section-title">⬇ Downstream (imports)</div>
      <div class="panel-dep-list">${d.downstream.map(u => `<div class="panel-dep-item${u.includes('API') ? ' api-dep' : ''}">${u}</div>`).join('')}</div>
    </div>` : ''}
  `;
}

function sfToggleFile(fi, nodeId) {
  const toggle = document.getElementById(`sf-toggle-${nodeId}-${fi}`);
  const fnlist = document.getElementById(`sf-fnlist-${nodeId}-${fi}`);
  if (!toggle || !fnlist) return;
  const isOpen = fnlist.classList.contains('open');
  fnlist.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

// Direct mapping: bg method name → chain key
// Any method that appears in a chain (or is closely related) maps here
const LO_METHOD_TO_CHAIN = {};
(function buildMethodChainMap() {
  // Explicit mappings for entry points
  const explicit = {
    'upload()': 'upload', 'process()': 'upload', 'getStatus()': 'upload',
    'getResult()': 'upload', 'exportMarkdown()': 'upload', 'exportPdf()': 'upload',
    'getFrameUrl()': 'upload', 'getFrameBlob()': 'upload',
    'regenerate()': 'upload', 'submitUrl()': 'upload',
    'getVideos()': 'query', 'getPlans()': 'query', 'getUsage()': 'query',
    'googleLogin()': 'auth', 'getMe()': 'auth',
    'update_video_status()': 'upload', 'update_progress()': 'upload',
    'upsert_transcript()': 'upload', 'create_keyframes()': 'upload',
    'create_ecpay_checkout()': 'query', 'handle_ecpay_return()': 'query',
    'cancel_ecpay_subscription()': 'query',
    'generate_share_token()': 'query', 'enable_sharing()': 'query',
    'disable_sharing()': 'query', 'get_queue_length()': 'upload',
    'get_queue_position()': 'upload',
    'check_anonymous_quota()': 'auth', 'increment_anonymous_usage()': 'auth',
    'createCheckout()': 'query', 'cancelSubscription()': 'query', 'getSubscription()': 'query',
    'getDashboard()': 'query', 'getUsers()': 'query', 'getUserDetail()': 'query',
    'updateUserPlan()': 'query', 'deleteVideo()': 'upload', 'retryVideo()': 'upload',
    'enableShare()': 'query', 'disableShare()': 'query', 'getSharedVideo()': 'query',
    'getReferral()': 'auth', 'applyReferral()': 'auth',
    'enable_sharing()': 'query', 'disable_sharing()': 'query',
  };
  Object.assign(LO_METHOD_TO_CHAIN, explicit);
})();

function loFindChainForMethod(methodName) {
  if (LO_METHOD_TO_CHAIN[methodName]) return LO_METHOD_TO_CHAIN[methodName];
  // Fallback: try partial match on chain node methods
  for (const [key, chain] of Object.entries(LO_CHAINS)) {
    for (const node of chain.nodes) {
      const clean = methodName.replace(/\(\)$/, '').toLowerCase();
      const chainClean = node.method.replace(/\(\)$/, '').toLowerCase();
      if (clean === chainClean) return key;
    }
  }
  return null;
}

// Recommended entry methods (★) — these are the chain entry points
const LO_STAR_METHODS = new Set([
  'upload()', 'getVideos()', 'googleLogin()'
]);

function loRecalcLayout(svg, bgGroup, cardPositions, layers, layerGapY, headerH, rowH, padY, collapseMax) {
  // Recalculate Y positions based on current card heights
  const cardW = 240;
  const colGap = 50;
  const W = parseInt(svg.getAttribute('viewBox').split(' ')[2]) || 960;
  let curY = 44;
  layers.forEach((layerCards) => {
    if (layerCards.length === 0) return;
    const totalW = layerCards.length * cardW + (layerCards.length - 1) * colGap;
    let curX = (W - totalW) / 2;
    layerCards.forEach(card => {
      const pos = cardPositions[card.cat];
      pos.x = curX;
      pos.y = curY;
      // Update foreignObject position
      const allFOs = bgGroup.querySelectorAll('foreignObject');
      allFOs.forEach(fo => {
        const cardDiv = fo.querySelector('.lo-group-card');
        if (cardDiv) {
          const headerEl = cardDiv.querySelector('.lo-group-header');
          if (headerEl && headerEl.textContent.includes(card.label)) {
            fo.setAttribute('x', curX);
            fo.setAttribute('y', curY);
          }
        }
      });
      curX += cardW + colGap;
    });
    const maxH = Math.max(...layerCards.map(c => cardPositions[c.cat].h));
    curY += maxH + layerGapY;
  });
  // Resize SVG
  const H = parseInt(svg.getAttribute('viewBox').split(' ')[3]) || 600;
  const totalContentH = curY + 20;
  const newH = Math.max(600, totalContentH);
  svg.setAttribute('viewBox', `0 0 ${W} ${newH}`);
  svg.style.height = newH + 'px';
  // Redraw edges (remove old, keep defs/markers)
  bgGroup.querySelectorAll('.lo-group-edge').forEach(el => el.remove());
  LO_GROUP_EDGES.forEach(e => {
    const from = cardPositions[e.from];
    const to = cardPositions[e.to];
    if (!from || !to) return;
    const x1 = from.x + from.w / 2;
    const y1 = from.y + from.h;
    const x2 = to.x + to.w / 2;
    const y2 = to.y;
    const my = (y1 + y2) / 2;
    const path = createSVGEl('path', {
      class: 'lo-group-edge',
      d: `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`,
      'marker-end': 'url(#lo-group-arrow)'
    });
    bgGroup.appendChild(path);
  });
}

function initLO() {
  const wrap = document.getElementById('lo-canvas-wrap');
  const svg = document.getElementById('lo-svg');
  const W = wrap.clientWidth || 900;
  const H = wrap.clientHeight || 600;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');

  const defs = createSVGEl('defs');
  defs.innerHTML = `
    <marker id="lo-arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaa"/>
    </marker>
    <marker id="lo-arrow-active" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="lo-group-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#bbb"/>
    </marker>
  `;
  svg.appendChild(defs);

  // === Build category groups from LO_BACKGROUND_NODES ===
  const groupedMethods = {};
  LO_GROUP_DEFS.forEach(g => { groupedMethods[g.cat] = []; });
  LO_BACKGROUND_NODES.forEach(n => {
    const cat = n.cat;
    if (groupedMethods[cat]) groupedMethods[cat].push(n);
    else {
      // Fallback: put in utils
      if (!groupedMethods.utils) groupedMethods.utils = [];
      groupedMethods.utils.push(n);
    }
  });

  // === Layout: dagre TB with group cards ===
  const bgGroup = createSVGEl('g', { id: 'lo-bg-nodes' });

  // Card sizing — rowH must match actual CSS (padding 3+3 + font ~16 = 22, + gap 2 = 24)
  const cardW = 240;
  const rowH = 24;
  const headerH = 36;
  const padY = 12;
  const layerGapY = 44;
  const colGap = 50;

  // Dagre layers: routes(0), middleware(1), services(2), models+utils(3)
  const catLayer = { routes: 0, middleware: 1, services: 2, models: 3, utils: 3 };
  const layers = [[], [], [], []]; // each layer has card defs
  const cardPositions = {}; // cat → {x, y, w, h}

  const LO_COLLAPSE_MAX = 5; // default visible methods
  LO_GROUP_DEFS.forEach(gd => {
    const methods = groupedMethods[gd.cat] || [];
    const visibleCount = Math.min(methods.length, LO_COLLAPSE_MAX);
    const needToggle = methods.length > LO_COLLAPSE_MAX;
    const toggleRowH = needToggle ? rowH : 0;
    const h = headerH + visibleCount * rowH + toggleRowH + padY;
    const fullH = headerH + methods.length * rowH + toggleRowH + padY;
    const layer = catLayer[gd.cat] || 3;
    layers[layer].push({ ...gd, methods, cardH: h, fullH, collapsed: needToggle, needToggle });
  });

  // Position each layer centered
  let curY = 44; // start below hint text
  layers.forEach((layerCards, layerIdx) => {
    if (layerCards.length === 0) return;
    const totalW = layerCards.length * cardW + (layerCards.length - 1) * colGap;
    let curX = (W - totalW) / 2;
    layerCards.forEach(card => {
      cardPositions[card.cat] = { x: curX, y: curY, w: cardW, h: card.cardH };

      // Render card via foreignObject
      const fo = createSVGEl('foreignObject', {
        x: curX, y: curY, width: cardW, height: card.cardH
      });
      const cardDiv = document.createElement('div');
      cardDiv.className = 'lo-group-card';
      cardDiv.style.width = '100%';
      cardDiv.style.height = '100%';

      // Header
      const header = document.createElement('div');
      header.className = 'lo-group-header';
      header.style.background = card.color;
      header.innerHTML = `${card.icon} ${card.label} <span class="lo-group-count">${card.methods.length} methods</span>`;
      cardDiv.appendChild(header);

      // Method list
      const methodsDiv = document.createElement('div');
      methodsDiv.className = 'lo-group-methods';
      card.methods.forEach((m, mi) => {
        const row = document.createElement('div');
        row.className = 'lo-method-row';
        if (card.needToggle && mi >= LO_COLLAPSE_MAX) {
          row.style.display = 'none';
          row.dataset.hidden = '1';
        }
        const isStar = LO_STAR_METHODS.has(m.method);
        row.innerHTML = `${isStar ? '<span class="lo-method-star">★</span>' : ''}
          <span>${m.method}</span>
          <span class="lo-method-cls">${m.cls}</span>`;
        row.addEventListener('click', (e) => {
          e.stopPropagation();
          const chainKey = loFindChainForMethod(m.method);
          if (chainKey) loSelectChain(chainKey);
        });
        methodsDiv.appendChild(row);
      });

      // Toggle button for collapse/expand
      if (card.needToggle) {
        const toggleBtn = document.createElement('div');
        toggleBtn.className = 'lo-toggle-btn';
        const hiddenCount = card.methods.length - LO_COLLAPSE_MAX;
        toggleBtn.innerHTML = `▼ 展開更多 (${card.methods.length})`;
        toggleBtn.dataset.collapsed = '1';
        toggleBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          const isCollapsed = toggleBtn.dataset.collapsed === '1';
          const rows = methodsDiv.querySelectorAll('.lo-method-row[data-hidden]');
          if (isCollapsed) {
            rows.forEach(r => r.style.display = '');
            toggleBtn.innerHTML = `▲ 收合`;
            toggleBtn.dataset.collapsed = '0';
            fo.setAttribute('height', card.fullH);
            cardPositions[card.cat].h = card.fullH;
          } else {
            rows.forEach(r => r.style.display = 'none');
            toggleBtn.innerHTML = `▼ 展開更多 (${card.methods.length})`;
            toggleBtn.dataset.collapsed = '1';
            fo.setAttribute('height', card.cardH);
            cardPositions[card.cat].h = card.cardH;
          }
          cardDiv.style.height = fo.getAttribute('height') + 'px';
          // Recalculate total SVG height and redraw edges
          loRecalcLayout(svg, bgGroup, cardPositions, layers, layerGapY, headerH, rowH, padY, LO_COLLAPSE_MAX);
        });
        methodsDiv.appendChild(toggleBtn);
      }
      cardDiv.appendChild(methodsDiv);

      fo.appendChild(cardDiv);
      bgGroup.appendChild(fo);

      curX += cardW + colGap;
    });
    // Advance Y for next layer
    const maxH = Math.max(...layerCards.map(c => c.cardH));
    curY += maxH + layerGapY;
  });

  // === Resize SVG to fit all content ===
  const totalContentH = curY + 20;
  loContentW = W;
  loContentH = Math.max(H, totalContentH);
  svg.setAttribute('viewBox', `0 0 ${W} ${loContentH}`);
  svg.style.width = W + 'px';
  svg.style.height = loContentH + 'px';
  svg.style.transform = '';
  svg.style.transformOrigin = '';
  loZoomLevel = 100;
  document.getElementById('lo-zoom-label').textContent = '100%';

  // Auto-fit if content is taller than viewport
  if (totalContentH > H * 1.2) {
    loZoomFit();
  }

  // === Draw group dependency edges ===
  LO_GROUP_EDGES.forEach(e => {
    const from = cardPositions[e.from];
    const to = cardPositions[e.to];
    if (!from || !to) return;
    const x1 = from.x + from.w / 2;
    const y1 = from.y + from.h;
    const x2 = to.x + to.w / 2;
    const y2 = to.y;
    const my = (y1 + y2) / 2;
    const path = createSVGEl('path', {
      d: `M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`,
      class: 'lo-group-edge',
      'marker-end': 'url(#lo-group-arrow)'
    });
    bgGroup.appendChild(path);
  });

  svg.appendChild(bgGroup);

  // Chain nodes + edges group (hidden initially)
  const chainGroup = createSVGEl('g', { id: 'lo-chain-group', style: 'display:none' });
  svg.appendChild(chainGroup);
}

// === LO Zoom ===
let loZoomLevel = 100;
let loContentW = 900;
let loContentH = 600;

function loZoom(dir) {
  loZoomLevel = Math.max(40, Math.min(150, loZoomLevel + dir * 15));
  applyLoZoom();
}

function loZoomFit() {
  const wrap = document.getElementById('lo-canvas-wrap');
  const wrapH = wrap.clientHeight || 600;
  const wrapW = wrap.clientWidth || 900;
  // Fit content into view
  const scaleH = Math.floor((wrapH / loContentH) * 100);
  const scaleW = Math.floor((wrapW / loContentW) * 100);
  loZoomLevel = Math.max(40, Math.min(100, Math.min(scaleH, scaleW)));
  applyLoZoom();
}

function applyLoZoom() {
  const svg = document.getElementById('lo-svg');
  const scale = loZoomLevel / 100;
  svg.style.transformOrigin = 'top left';
  svg.style.transform = `scale(${scale})`;
  // Adjust wrapper scroll
  svg.style.width = loContentW + 'px';
  svg.style.height = loContentH + 'px';
  document.getElementById('lo-zoom-label').textContent = loZoomLevel + '%';
}

function loSelectChain(chainKey) {
  loCurrentChain = chainKey;
  const chain = LO_CHAINS[chainKey];
  const wrap = document.getElementById('lo-canvas-wrap');
  const svg = document.getElementById('lo-svg');
  const W = wrap.clientWidth || 900;
  const H = wrap.clientHeight || 600;

  // Hide bg nodes (group cards)
  const bgGroup = document.getElementById('lo-bg-nodes');
  bgGroup.style.display = 'none';

  // Hide hint
  document.getElementById('lo-hint').classList.add('fade-out');

  // Show chain group
  const chainGroup = document.getElementById('lo-chain-group');
  chainGroup.style.display = '';
  chainGroup.innerHTML = '';

  // Layout chain: centered, TB
  const nodeW = 200;
  const nodeH = 44;
  const layerH = 100;
  const totalLayers = chain.nodes.length;
  const startY = 40;
  const centerX = W / 2 - nodeW / 2;

  // Calculate required height, reset zoom, make scrollable
  const requiredH = startY + totalLayers * layerH + 40;
  const svgH = Math.max(H, requiredH);
  loContentW = W;
  loContentH = svgH;
  loZoomLevel = 100;
  svg.setAttribute('viewBox', `0 0 ${W} ${svgH}`);
  svg.style.width = W + 'px';
  svg.style.height = svgH + 'px';
  svg.style.transform = '';
  svg.style.transformOrigin = '';
  document.getElementById('lo-zoom-label').textContent = '100%';

  // Add chain title
  const titleFo = createSVGEl('foreignObject', { x: centerX - 40, y: 8, width: 280, height: 28 });
  const titleDiv = document.createElement('div');
  titleDiv.style.cssText = 'font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--ink-primary);text-align:center;padding:4px;';
  titleDiv.textContent = chain.name;
  titleFo.appendChild(titleDiv);
  chainGroup.appendChild(titleFo);

  // Draw edges first
  chain.nodes.forEach((n, i) => {
    if (i === 0) return;
    const fromNode = chain.nodes[i - 1];
    const toNode = n;
    const fx = centerX + nodeW / 2;
    const fy = startY + (i - 1) * layerH + nodeH;
    const tx = centerX + nodeW / 2;
    const ty = startY + i * layerH;
    const path = createSVGEl('path', {
      class: 'lo-edge active-edge',
      d: `M ${fx} ${fy} L ${tx} ${ty}`,
      'marker-end': 'url(#lo-arrow-active)',
      'stroke': LO_CAT_COLORS[toNode.cat] || '#888',
      'stroke-width': '1.5',
      'fill': 'none',
      'opacity': '0.6'
    });
    chainGroup.appendChild(path);

    // Layer label connector
    const catColor = LO_CAT_COLORS[fromNode.cat] || '#888';
    const dot = createSVGEl('circle', {
      cx: centerX - 16, cy: startY + (i - 1) * layerH + nodeH / 2,
      r: 4, fill: catColor, opacity: 0.5
    });
    chainGroup.appendChild(dot);
  });

  // Draw nodes
  chain.nodes.forEach((n, i) => {
    const nx = centerX;
    const ny = startY + i * layerH;
    const color = LO_CAT_COLORS[n.cat] || '#888';

    // Side category indicator
    const sideBar = createSVGEl('rect', {
      x: nx - 8, y: ny, width: 4, height: nodeH, rx: 2,
      fill: color, opacity: 0.5
    });
    chainGroup.appendChild(sideBar);

    // Layer number
    const layerText = createSVGEl('text', {
      x: nx - 16, y: ny + nodeH / 2 + 4,
      'font-size': '9', fill: color,
      'text-anchor': 'middle',
      style: 'pointer-events:none; user-select:none; font-family:monospace; font-weight:600;'
    });
    layerText.textContent = i;
    chainGroup.appendChild(layerText);

    const fo = createSVGEl('foreignObject', { x: nx, y: ny, width: nodeW, height: nodeH });
    const div = document.createElement('div');
    div.className = 'lo-node-card active-node';
    div.style.borderColor = color;
    div.style.width = nodeW + 'px';
    div.style.height = nodeH + 'px';
    div.style.cursor = 'pointer';
    div.setAttribute('data-nid', n.id);
    div.innerHTML = `
      <span class="lo-node-method" style="font-size:11px;color:var(--ink-primary)">${n.method}</span>
      <span class="lo-node-class">${n.cls}</span>
    `;
    div.addEventListener('click', () => loSelectNode(n.id, div, color));
    fo.appendChild(div);
    chainGroup.appendChild(fo);
  });

  // Update bottom bar
  const bar = document.getElementById('lo-bottom-bar');
  bar.classList.add('visible');
  document.getElementById('lo-chain-name').textContent = chain.name;
  document.getElementById('lo-chain-count').textContent = `${chain.nodes.length} 個節點`;
}

function loSelectNode(nodeId, el, color) {
  // Deselect others
  document.querySelectorAll('[data-nid]').forEach(n => n.classList.remove('selected-node'));
  el.classList.add('selected-node');
  loSelectedNodeId = nodeId;
  loShowNodeDetail(nodeId, color);
}

function loShowNodeDetail(nodeId, color) {
  const d = LO_NODE_DETAILS[nodeId];
  if (!d) return;

function autoCategorizeDJEntries(entries) {
  const groups = {};
  entries.forEach(e => {
    // Extract prefix: "POST /api/v1/videos/upload" → "videos"
    const urlPart = e.method.split(' ')[1] || '';
    const segments = urlPart.replace(/^\/api\/v\d+\//, '').split('/');
    const prefix = segments[0] || 'other';
    if (!groups[prefix]) groups[prefix] = [];
    groups[prefix].push(e);
  });
  return Object.entries(groups).map(([prefix, entries]) => {
    const meta = DJ_CAT_META[prefix] || { label: prefix, color: '#546e7a', icon: '📁' };
    return { prefix, ...meta, entries };
  });
}

function initDJ() {
  const wrap = document.getElementById('dj-canvas-wrap');
  const svg = document.getElementById('dj-svg');
  const W = wrap.clientWidth || 900;
  const H = wrap.clientHeight || 600;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', '100%');
  svg.setAttribute('height', '100%');

  const defs = createSVGEl('defs');
  defs.innerHTML = `
    <marker id="dj-arrow" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#43a047"/>
    </marker>
  `;
  svg.appendChild(defs);

  // Entry cards group — categorized layout
  const entryGroup = createSVGEl('g', { id: 'dj-entries' });

  const cardW = 260;
  const cardH = 64;
  const catHeaderH = 28;
  const cardGap = 12;
  const catGap = 24;
  const maxCols = 2;
  const marginLeft = 40;

  let curY = 30;

  DJ_CATEGORIES.forEach((cat, ci) => {
    // Category header
    const headerFo = createSVGEl('foreignObject', {
      x: marginLeft, y: curY, width: W - marginLeft * 2, height: catHeaderH
    });
    const headerDiv = document.createElement('div');
    headerDiv.style.cssText = `font-family:var(--font-ui);font-size:13px;font-weight:700;color:${cat.color};border-bottom:2px solid ${cat.color}22;padding-bottom:4px;display:flex;align-items:center;gap:6px;`;
    headerDiv.textContent = (cat.icon ? cat.icon + ' ' : '') + cat.label;
    const countSpan = document.createElement('span');
    countSpan.style.cssText = 'font-size:11px;font-weight:500;color:var(--ink-muted);';
    countSpan.textContent = `${cat.entries.length} endpoint${cat.entries.length > 1 ? 's' : ''}`;
    headerDiv.appendChild(countSpan);
    headerFo.appendChild(headerDiv);
    entryGroup.appendChild(headerFo);
    curY += catHeaderH + 8;

    // Entry cards in grid
    const cols = Math.min(maxCols, cat.entries.length);
    const totalCardW = cols * cardW + (cols - 1) * cardGap;
    const startX = marginLeft;

    cat.entries.forEach((entry, i) => {
      const col = i % maxCols;
      const row = Math.floor(i / maxCols);
      const ex = startX + col * (cardW + cardGap);
      const ey = curY + row * (cardH + cardGap);

      // Pulse ring
      const ring = createSVGEl('rect', {
        x: ex, y: ey, width: cardW, height: cardH, rx: 10,
        class: 'dj-pulse-ring',
        style: `animation-delay:${(ci * 0.5 + i * 0.15)}s`
      });
      entryGroup.appendChild(ring);

      const fo = createSVGEl('foreignObject', { x: ex, y: ey, width: cardW, height: cardH });
      const div = document.createElement('div');
      div.className = 'dj-entry-card';
      div.setAttribute('data-entry', entry.id);
      div.style.borderLeft = `4px solid ${cat.color}`;
      div.innerHTML = `
        <div class="dj-entry-method">${entry.method}</div>
        <div class="dj-entry-desc">${entry.desc}</div>
        <span class="dj-entry-badge">${entry.badge}</span>
      `;
      div.addEventListener('click', () => djStartJourney(entry.id));
      fo.appendChild(div);
      entryGroup.appendChild(fo);
    });

    const catRows = Math.ceil(cat.entries.length / maxCols);
    curY += catRows * (cardH + cardGap) + catGap;
  });

  svg.appendChild(entryGroup);

  // Journey display group
  const journeyGroup = createSVGEl('g', { id: 'dj-journey-group', style: 'display:none' });
  svg.appendChild(journeyGroup);
}

function djStartJourney(entryId) {
  const journey = DJ_JOURNEYS[entryId];
  if (!journey) return;

  // Clear previous animation
  if (djAnimationTimer) { clearTimeout(djAnimationTimer); djAnimationTimer = null; }

  djCurrentJourney = entryId;
  djCurrentStep = -1;

  const wrap = document.getElementById('dj-canvas-wrap');
  const svg = document.getElementById('dj-svg');
  const W = wrap.clientWidth || 900;
  const H = wrap.clientHeight || 600;

  // Hide entries and hint
  document.getElementById('dj-entries').style.display = 'none';
  document.getElementById('dj-hint').classList.add('fade-out');

  // Clear and show journey group
  const jGroup = document.getElementById('dj-journey-group');
  jGroup.style.display = '';
  jGroup.innerHTML = '';

  // Layout: vertical stagger, centered
  const nodeW = 340;
  const nodeH = 76;
  const stepSpacing = 96;
  const totalH = journey.steps.length * stepSpacing + nodeH;
  const startY = 30;
  const cx = W / 2 - nodeW / 2;

  // Make scrollable if content exceeds viewport
  const requiredH = startY + totalH + 40;
  const svgH = Math.max(H, requiredH);
  svg.setAttribute('viewBox', `0 0 ${W} ${svgH}`);
  svg.style.height = svgH + 'px';
  wrap.classList.add('scrollable');

  // Pre-create all step nodes (invisible)
  const stepEls = [];
  journey.steps.forEach((step, i) => {
    const nx = cx;
    const ny = startY + i * stepSpacing;

    // Edge (connect from previous)
    if (i > 0) {
      const prevNy = startY + (i - 1) * stepSpacing + nodeH;
      const path = createSVGEl('path', {
        class: 'dj-edge',
        id: `dj-edge-${i}`,
        d: `M ${cx + nodeW / 2} ${prevNy} L ${cx + nodeW / 2} ${ny}`,
        'marker-end': 'url(#dj-arrow)'
      });
      jGroup.appendChild(path);
    }

    // Step number circle
    const numCircle = createSVGEl('circle', {
      cx: cx - 16, cy: ny + nodeH / 2,
      r: 10,
      fill: '#e8f5e9',
      stroke: '#43a047',
      'stroke-width': '1.5',
      opacity: 0,
      id: `dj-num-circle-${i}`
    });
    jGroup.appendChild(numCircle);
    const numText = createSVGEl('text', {
      x: cx - 16, y: ny + nodeH / 2 + 4,
      'text-anchor': 'middle',
      'font-size': '9',
      'font-weight': '700',
      fill: '#388e3c',
      opacity: 0,
      id: `dj-num-text-${i}`,
      style: 'pointer-events:none; user-select:none; font-family:monospace;'
    });
    numText.textContent = i + 1;
    jGroup.appendChild(numText);

    const fo = createSVGEl('foreignObject', {
      x: nx, y: ny,
      width: nodeW, height: nodeH,
      id: `dj-fo-${i}`,
      opacity: 0
    });
    const div = document.createElement('div');
    div.className = 'dj-step-node';
    div.setAttribute('data-step', i);
    div.innerHTML = `
      <div class="dj-step-num">Step ${i + 1}</div>
      <div class="dj-step-name">${step.name}</div>
      <div class="dj-step-desc">${step.desc}</div>
    `;
    div.addEventListener('click', () => djPanelSetActive(i));
    fo.appendChild(div);
    jGroup.appendChild(fo);
    stepEls.push({ fo, div, numCircle, numText });
  });

  // Show right panel
  djShowPanel(journey, entryId);

  // Stagger animation
  function animateStep(stepIdx) {
    if (stepIdx >= journey.steps.length) return;
    djCurrentStep = stepIdx;

    const { fo, div, numCircle, numText } = stepEls[stepIdx];

    // Fade in node
    let opacity = 0;
    const fadeIn = setInterval(() => {
      opacity = Math.min(1, opacity + 0.15);
      fo.setAttribute('opacity', opacity);
      numCircle.setAttribute('opacity', opacity);
      numText.setAttribute('opacity', opacity);
      if (opacity >= 1) clearInterval(fadeIn);
    }, 20);

    // Show edge
    if (stepIdx > 0) {
      const edgeEl = document.getElementById(`dj-edge-${stepIdx}`);
      if (edgeEl) {
        edgeEl.classList.add('appeared');
      }
    }

    // Activate step
    div.classList.add('appeared', 'active-step');
    if (stepIdx > 0) {
      const prevDiv = stepEls[stepIdx - 1].div;
      prevDiv.classList.remove('active-step');
    }

    // Update panel — highlight only, don't expand detail
    djPanelHighlight(stepIdx);

    djAnimationTimer = setTimeout(() => animateStep(stepIdx + 1), 350);
  }

  animateStep(0);
}

function djShowPanel(journey, entryId) {
  document.getElementById('dj-placeholder').style.display = 'none';
  const detailEl = document.getElementById('dj-detail');
  detailEl.classList.add('visible');

  const stepsHtml = journey.steps.map((s, i) => `
    <div class="dj-step-item" id="dj-panel-step-${i}" onclick="djPanelSetActive(${i})">
      <div class="dj-step-item-header">
        <div class="dj-step-num-badge" id="dj-panel-badge-${i}">${i + 1}</div>
        <div class="dj-step-item-name">${s.name}</div>
        <div class="dj-step-status" id="dj-panel-status-${i}"></div>
      </div>
      <div class="dj-step-detail" id="dj-panel-detail-${i}">
        <div class="dj-detail-row">
          <div class="dj-detail-label">📥 Input</div>
          <div class="dj-detail-val">${s.input}</div>
          <div class="dj-detail-label">📤 Output</div>
          <div class="dj-detail-val">${s.output}</div>
          <div class="dj-detail-label">🔄 Transform</div>
          <div class="dj-detail-val">${s.transform}</div>
          <div class="dj-detail-label">📍 Method</div>
          <div class="dj-detail-val">${s.method}<br><span style="opacity:0.7">${s.file}</span></div>
        </div>
      </div>
    </div>
  `).join('');

  detailEl.innerHTML = `
    <div class="dj-panel-header-block">
      <div class="dj-panel-journey-title">${journey.title}</div>
      <div class="dj-panel-journey-sub">${journey.desc} · ${journey.steps.length} 步驟</div>
    </div>
    <div class="dj-step-list" id="dj-step-list">${stepsHtml}</div>
    <button class="dj-replay-btn" onclick="djReplay()">重播此旅程</button>
    <button class="dj-clear-btn" onclick="djClearSelection()">清除選取</button>
  `;
}

// Highlight row during animation — does NOT expand detail
function djPanelHighlight(stepIdx) {
  const journey = DJ_JOURNEYS[djCurrentJourney];
  if (!journey) return;

  journey.steps.forEach((_, i) => {
    const item = document.getElementById(`dj-panel-step-${i}`);
    const status = document.getElementById(`dj-panel-status-${i}`);
    if (!item) return;

    if (i === stepIdx) {
      item.classList.add('active-item');
      item.classList.remove('completed-item');
      if (status) { status.classList.remove('done'); status.classList.add('active'); }
      item.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    } else if (i < stepIdx) {
      item.classList.remove('active-item');
      item.classList.add('completed-item');
      if (status) { status.classList.add('done'); status.classList.remove('active'); }
    } else {
      item.classList.remove('active-item', 'completed-item');
      if (status) { status.classList.remove('done', 'active'); }
    }
  });
}

// Click handler — toggles detail open/close
function djPanelSetActive(stepIdx) {
  const journey = DJ_JOURNEYS[djCurrentJourney];
  if (!journey) return;

  // First highlight
  djPanelHighlight(stepIdx);

  // Then toggle detail: close all others, toggle clicked one
  journey.steps.forEach((_, i) => {
    const detail = document.getElementById(`dj-panel-detail-${i}`);
    if (!detail) return;

    if (i === stepIdx) {
      // Toggle: if already open, close it; otherwise open
      detail.classList.toggle('open');
    } else {
      detail.classList.remove('open');
    }
  });

  // Also highlight canvas step
  document.querySelectorAll('[data-step]').forEach(el => {
    el.classList.remove('active-step');
  });
  const targetStep = document.querySelector(`[data-step="${stepIdx}"]`);
  if (targetStep) targetStep.classList.add('active-step');
  return; // skip the old logic below
}


function djReplay() {
  if (!djCurrentJourney) return;
  // Reset all animation state
  if (djAnimationTimer) { clearTimeout(djAnimationTimer); djAnimationTimer = null; }

  // Scroll to top
  document.getElementById('dj-canvas-wrap').scrollTop = 0;

  // Re-hide journey group elements
  const jGroup = document.getElementById('dj-journey-group');
  jGroup.innerHTML = '';
  jGroup.style.display = 'none';

  // Re-init journey
  djStartJourney(djCurrentJourney);
}

function djClearSelection() {
  // Stop any running animation
  if (djAnimationTimer) { clearTimeout(djAnimationTimer); djAnimationTimer = null; }
  djCurrentJourney = null;
  djCurrentStep = -1;

  // Restore SVG size and remove scroll
  const wrap = document.getElementById('dj-canvas-wrap');
  const svg = document.getElementById('dj-svg');
  const W = wrap.clientWidth || 900;
  const H = wrap.clientHeight || 600;
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.style.height = '100%';
  wrap.classList.remove('scrollable');
  wrap.scrollTop = 0;

  // Hide journey group, show entries + hint
  const jGroup = document.getElementById('dj-journey-group');
  if (jGroup) { jGroup.innerHTML = ''; jGroup.style.display = 'none'; }
  const entries = document.getElementById('dj-entries');
  if (entries) entries.style.display = '';
  const hint = document.getElementById('dj-hint');
  if (hint) hint.classList.remove('fade-out');

  // Reset right panel to placeholder
  document.getElementById('dj-placeholder').style.display = '';
  const detailEl = document.getElementById('dj-detail');
  detailEl.classList.remove('visible');
  detailEl.innerHTML = '';
}

/* ============================================================
   SVG UTILITIES
   ============================================================ */
function createSVGEl(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k, v] of Object.entries(attrs)) {
    el.setAttribute(k, v);
  }
  return el;
}
